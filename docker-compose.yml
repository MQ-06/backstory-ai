# Local development only — Postgres + Redis for Sprint 0+
# Run: docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: backstory-postgres
    environment:
      POSTGRES_USER: backstory
      POSTGRES_PASSWORD: backstory
      POSTGRES_DB: backstory
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backstory -d backstory"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: backstory-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
