name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgresql+asyncpg://backstory:backstory@localhost:5432/backstory
  REDIS_URL: redis://localhost:6379/0

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: backstory
          POSTGRES_PASSWORD: backstory
          POSTGRES_DB: backstory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U backstory -d backstory"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run alembic upgrade head
      - run: uv run pytest -q
      - name: Eval gate
        run: uv run python -m app.eval

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - run: pnpm typecheck
      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: backstory
          POSTGRES_PASSWORD: backstory
          POSTGRES_DB: backstory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U backstory -d backstory"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://backstory:backstory@localhost:5432/backstory
      REDIS_URL: redis://localhost:6379/0
      API_URL: http://127.0.0.1:8000
      WEB_URL: http://127.0.0.1:3000
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: uv sync --dev
        working-directory: apps/api
      - run: pnpm test:e2e:install
      - run: pnpm test:e2e
