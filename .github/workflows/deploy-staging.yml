name: Deploy staging

on:
  workflow_dispatch:
    inputs:
      deploy_api:
        description: Deploy API to Fly.io
        type: boolean
        default: true
      deploy_worker:
        description: Deploy Celery worker to Fly.io
        type: boolean
        default: true

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy-api:
    if: inputs.deploy_api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy API
        working-directory: apps/api
        run: fly deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-worker:
    if: inputs.deploy_worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy worker
        working-directory: apps/api
        run: fly deploy --config fly.worker.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
